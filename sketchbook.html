<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎨 The Sketchbook</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=EB+Garamond:ital,wght@0,400;1,400&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --void: #07070f; --deep: #0e0e1f;
  --gold: #e8c87a; --gold-dim: rgba(232,200,122,0.25); --gold-pale: rgba(232,200,122,0.08);
  --sage: #6a9070; --sage-light: #9abea2;
  --rose: #c97a9a; --plum: #9b6abf; --plum-light: #c4a8d8;
  --text: #f0eaf8; --text-soft: #b0a8d0; --text-muted: #6a6480;
  --border: rgba(255,255,255,0.08);
  --sel: rgba(232,200,122,0.8);
}
html,body { width:100%; height:100%; overflow:hidden; font-family:'EB Garamond',serif; color:var(--text); background:var(--void); user-select:none; }

/* ── TOPBAR ── */
#topbar {
  position:fixed; top:0; left:0; right:0; height:52px; z-index:300;
  display:flex; align-items:center; gap:8px; padding:0 16px;
  background:rgba(7,7,15,0.95); backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(232,200,122,0.15);
}
.tb-logo { font-family:'Playfair Display',serif; font-size:14px; color:var(--gold); text-decoration:none; letter-spacing:0.5px; margin-right:4px; white-space:nowrap; }
.tb-sep { width:1px; height:20px; background:var(--border); margin:0 4px; flex-shrink:0; }
.tb-btn {
  background:transparent; border:1px solid var(--border); border-radius:8px;
  padding:5px 11px; font-family:'Cormorant Garamond',serif; font-size:13px;
  color:var(--text-muted); cursor:pointer; transition:all 0.15s; white-space:nowrap;
  display:flex; align-items:center; gap:5px;
}
.tb-btn:hover { border-color:var(--gold-dim); color:var(--gold); }
.tb-btn.active { background:var(--gold-pale); border-color:var(--gold-dim); color:var(--gold); }
.tb-btn.danger:hover { border-color:rgba(201,122,154,0.5); color:var(--rose); }
#board-title-inp {
  background:transparent; border:none; border-bottom:1px solid transparent;
  font-family:'Playfair Display',serif; font-size:15px; color:var(--gold);
  outline:none; width:180px; transition:border-color 0.2s;
}
#board-title-inp:focus { border-bottom-color:var(--gold-dim); }
#board-title-inp::placeholder { color:var(--text-muted); font-style:italic; font-weight:400; }
.tb-spacer { flex:1; }
#save-ind { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:12px; color:var(--sage-light); opacity:0; transition:opacity 0.4s; }
#save-ind.on { opacity:1; }

/* ── TOOL PALETTE (floating left) ── */
#tool-palette {
  position:fixed; left:10px; top:62px; z-index:200;
  display:flex; flex-direction:column; gap:4px;
  background:rgba(7,7,15,0.92); border:1px solid var(--border);
  border-radius:12px; padding:8px 6px;
  backdrop-filter:blur(12px);
}
.tool-btn {
  width:38px; height:38px; border-radius:8px; border:1px solid transparent;
  background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:17px; transition:all 0.15s; color:var(--text-muted);
  position:relative;
}
.tool-btn:hover { background:var(--gold-pale); border-color:var(--gold-dim); color:var(--gold); }
.tool-btn.active { background:var(--gold-pale); border-color:var(--gold-dim); color:var(--gold); }
.tool-divider { width:26px; height:1px; background:var(--border); margin:2px auto; }

/* ── PROPERTIES PANEL (floating right) ── */
#prop-panel {
  position:fixed; right:10px; top:62px; z-index:200; width:220px;
  background:rgba(7,7,15,0.92); border:1px solid var(--border); border-radius:12px;
  padding:12px; backdrop-filter:blur(12px);
  display:none; flex-direction:column; gap:10px;
}
#prop-panel.visible { display:flex; }
.prop-section { display:flex; flex-direction:column; gap:6px; }
.prop-label { font-family:'Cormorant Garamond',serif; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); }
.prop-row { display:flex; gap:6px; align-items:center; }
.prop-input {
  flex:1; background:rgba(255,255,255,0.05); border:1px solid var(--border);
  border-radius:6px; padding:5px 8px; font-family:'Cormorant Garamond',serif; font-size:13px;
  color:var(--text); outline:none; transition:border-color 0.15s;
}
.prop-input:focus { border-color:var(--gold-dim); }
.prop-btn {
  background:transparent; border:1px solid var(--border); border-radius:6px;
  padding:5px 10px; font-family:'Cormorant Garamond',serif; font-size:12px;
  color:var(--text-muted); cursor:pointer; transition:all 0.15s; white-space:nowrap;
}
.prop-btn:hover { border-color:var(--gold-dim); color:var(--gold); }
.prop-btn.active { background:var(--gold-pale); border-color:var(--gold-dim); color:var(--gold); }
.layer-row { display:flex; gap:4px; }
.layer-btn { flex:1; padding:5px; font-size:13px; background:transparent; border:1px solid var(--border); border-radius:6px; cursor:pointer; color:var(--text-muted); transition:all 0.15s; text-align:center; }
.layer-btn:hover { border-color:var(--gold-dim); color:var(--gold); }
.color-grid { display:flex; flex-wrap:wrap; gap:5px; }
.color-swatch { width:22px; height:22px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:all 0.15s; flex-shrink:0; }
.color-swatch:hover,.color-swatch.active { border-color:white; transform:scale(1.1); }
.font-row { display:flex; gap:4px; flex-wrap:wrap; }
.font-btn { padding:4px 8px; font-size:12px; background:transparent; border:1px solid var(--border); border-radius:4px; cursor:pointer; color:var(--text-muted); transition:all 0.15s; }
.font-btn:hover,.font-btn.active { border-color:var(--gold-dim); color:var(--gold); background:var(--gold-pale); }
.size-slider { width:100%; accent-color:var(--gold); }

/* ── BOARD LIST PANEL (floating) ── */
#board-panel {
  position:fixed; left:0; top:52px; bottom:0; width:260px; z-index:250;
  background:rgba(7,7,15,0.97); border-right:1px solid var(--border);
  display:flex; flex-direction:column; transform:translateX(-100%);
  transition:transform 0.28s cubic-bezier(.4,0,.2,1);
  backdrop-filter:blur(16px);
}
#board-panel.open { transform:translateX(0); }
.bp-header { padding:16px; border-bottom:1px solid var(--border); font-family:'Playfair Display',serif; font-size:16px; color:var(--gold); display:flex; align-items:center; justify-content:space-between; }
.bp-close { background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:18px; }
.bp-new { width:calc(100% - 32px); margin:12px 16px 0; padding:10px; background:var(--gold-pale); border:1px solid var(--gold-dim); border-radius:8px; cursor:pointer; font-family:'Cormorant Garamond',serif; font-size:14px; color:var(--gold); transition:all 0.15s; }
.bp-new:hover { background:rgba(232,200,122,0.15); }
.bp-list { flex:1; overflow-y:auto; padding:10px; }
.bp-item { padding:12px 14px; border-radius:8px; cursor:pointer; border:1px solid transparent; border-left:3px solid transparent; transition:all 0.15s; margin-bottom:5px; }
.bp-item:hover { background:rgba(255,255,255,0.04); border-color:var(--border); }
.bp-item.active { background:var(--gold-pale); border-left-color:var(--gold); }
.bp-item-name { font-family:'Playfair Display',serif; font-size:14px; color:var(--text-soft); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.bp-item.active .bp-item-name { color:var(--gold); }
.bp-item-meta { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:12px; color:var(--text-muted); margin-top:2px; }
.bp-empty { text-align:center; padding:30px 16px; font-family:'Cormorant Garamond',serif; font-style:italic; color:var(--text-muted); font-size:14px; line-height:1.7; }
#board-overlay { position:fixed; inset:0; z-index:249; display:none; }
#board-overlay.open { display:block; }

/* ── CANVAS AREA ── */
#canvas-wrap {
  position:fixed; left:0; right:0; top:52px; bottom:0; z-index:1;
  overflow:hidden; background:var(--void);
}
#canvas-bg {
  position:absolute; inset:0; pointer-events:none;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(155,106,191,0.06) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 70%, rgba(201,122,154,0.05) 0%,transparent 50%),
    var(--deep);
  transition:background 0.5s;
}
#canvas { position:absolute; inset:0; }

/* ── DRAW CANVAS (overlay) ── */
#draw-canvas { position:absolute; left:0; top:0; right:0; bottom:0; pointer-events:none; z-index:50; }
#draw-canvas.drawing { pointer-events:auto; cursor:crosshair; }

/* ── ITEMS ── */
.ci {
  position:absolute; user-select:none;
  transform-origin:center center;
  cursor:move;
}
.ci img { display:block; width:100%; height:100%; object-fit:cover; border-radius:2px; pointer-events:none; }
.ci-text-inner {
  width:100%; height:100%; overflow:hidden;
  display:flex; align-items:flex-start;
}
.ci-text-inner textarea {
  width:100%; height:100%; background:transparent; border:none; outline:none;
  resize:none; color:inherit; font-size:inherit; font-family:inherit;
  line-height:1.5; padding:4px; pointer-events:none; cursor:move;
}
.ci.selected .ci-text-inner textarea { pointer-events:auto; cursor:text; }
.ci-color-inner { width:100%; height:100%; border-radius:6px; }

/* ── SELECTION HANDLES ── */
.ci.selected { outline:1.5px solid var(--sel); outline-offset:2px; }
.handle {
  position:absolute; width:10px; height:10px; background:var(--void);
  border:1.5px solid var(--sel); border-radius:50%; z-index:10;
  cursor:pointer; display:none;
}
.ci.selected .handle { display:block; }
.h-nw { top:-6px; left:-6px; cursor:nw-resize; }
.h-ne { top:-6px; right:-6px; cursor:ne-resize; }
.h-sw { bottom:-6px; left:-6px; cursor:sw-resize; }
.h-se { bottom:-6px; right:-6px; cursor:se-resize; }
.h-n  { top:-6px; left:calc(50% - 5px); cursor:n-resize; }
.h-s  { bottom:-6px; left:calc(50% - 5px); cursor:s-resize; }
.h-e  { right:-6px; top:calc(50% - 5px); cursor:e-resize; }
.h-w  { left:-6px; top:calc(50% - 5px); cursor:w-resize; }
.h-rot { top:-26px; left:calc(50% - 5px); cursor:grab; background:var(--gold); border-color:var(--void); }
.h-rot:active { cursor:grabbing; }
.h-del { top:-6px; right:-6px; cursor:pointer; background:var(--rose); border-color:var(--void); display:none; font-size:8px; color:white; align-items:center; justify-content:center; }
.ci.selected .h-del { display:flex; }
.h-rot-line { position:absolute; top:-20px; left:calc(50%); width:1px; height:16px; background:var(--sel); display:none; z-index:9; }
.ci.selected .h-rot-line { display:block; }

/* ── CROP OVERLAY ── */
#crop-overlay {
  position:absolute; inset:0; z-index:100; display:none;
  background:rgba(0,0,0,0.5);
}
#crop-overlay.active { display:block; }
#crop-box {
  position:absolute; border:2px solid var(--gold);
  cursor:move; box-shadow:0 0 0 9999px rgba(0,0,0,0.5);
}
.crop-handle { position:absolute; width:12px; height:12px; background:var(--gold); border-radius:2px; }
.ch-nw{top:-6px;left:-6px;cursor:nw-resize} .ch-ne{top:-6px;right:-6px;cursor:ne-resize}
.ch-sw{bottom:-6px;left:-6px;cursor:sw-resize} .ch-se{bottom:-6px;right:-6px;cursor:se-resize}

/* ── UNSPLASH PANEL ── */
#unsplash-panel {
  position:fixed; right:10px; bottom:10px; z-index:200; width:240px;
  background:rgba(7,7,15,0.95); border:1px solid var(--border); border-radius:12px;
  padding:12px; backdrop-filter:blur(12px); display:none; flex-direction:column; gap:8px;
}
#unsplash-panel.open { display:flex; }
.us-row { display:flex; gap:6px; }
.us-input { flex:1; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:6px; padding:7px 10px; font-family:'Cormorant Garamond',serif; font-size:13px; color:var(--text); outline:none; }
.us-input:focus { border-color:var(--gold-dim); }
.us-input::placeholder { color:var(--text-muted); font-style:italic; }
.us-go { background:var(--gold-pale); border:1px solid var(--gold-dim); border-radius:6px; padding:7px 12px; cursor:pointer; font-family:'Cormorant Garamond',serif; font-size:13px; color:var(--gold); }
.us-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px; max-height:260px; overflow-y:auto; }
.us-thumb { aspect-ratio:1; border-radius:6px; overflow:hidden; cursor:pointer; border:1.5px solid transparent; transition:all 0.15s; position:relative; }
.us-thumb:hover { border-color:var(--gold-dim); transform:scale(1.03); }
.us-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
.us-loading { grid-column:1/-1; text-align:center; padding:16px; font-family:'Cormorant Garamond',serif; font-style:italic; font-size:13px; color:var(--text-muted); }

/* ── THEME BACKGROUNDS ── */
.theme-swatch { width:22px; height:22px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:all 0.15s; flex-shrink:0; }
.theme-swatch:hover,.theme-swatch.active { border-color:white; transform:scale(1.1); }

/* ── EMPTY STATE ── */
#empty-state {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:12px; pointer-events:none; opacity:0.35;
}
#empty-state svg { opacity:0.5; }
#empty-state p { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:16px; color:var(--text-muted); text-align:center; line-height:1.7; }

/* ── CONTEXT MENU ── */
#ctx-menu {
  position:fixed; z-index:500; background:rgba(7,7,15,0.97); border:1px solid var(--border);
  border-radius:10px; padding:6px; min-width:170px; display:none;
  backdrop-filter:blur(16px); box-shadow:0 8px 32px rgba(0,0,0,0.5);
}
.ctx-item { padding:8px 14px; border-radius:6px; cursor:pointer; font-family:'Cormorant Garamond',serif; font-size:14px; color:var(--text-soft); display:flex; align-items:center; gap:10px; transition:background 0.1s; }
.ctx-item:hover { background:var(--gold-pale); color:var(--gold); }
.ctx-item.danger:hover { background:rgba(201,122,154,0.15); color:var(--rose); }
.ctx-sep { height:1px; background:var(--border); margin:4px 0; }

/* ── STAR BG ── */
#star-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }
.nebula { position:fixed; border-radius:50%; filter:blur(90px); pointer-events:none; z-index:0; }
.nb1 { width:600px;height:400px;background:radial-gradient(ellipse,rgba(155,106,191,0.18) 0%,transparent 70%);top:-100px;left:-150px; }
.nb2 { width:500px;height:500px;background:radial-gradient(ellipse,rgba(201,122,154,0.12) 0%,transparent 70%);top:30%;right:-150px; }
::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-thumb{background:rgba(232,200,122,0.2);border-radius:4px}
</style>
</head>
<body>

<canvas id="star-canvas"></canvas>
<div class="nebula nb1"></div>
<div class="nebula nb2"></div>

<!-- TOPBAR -->
<div id="topbar">
  <a class="tb-logo" href="index.html">✦ Ava's Galaxy</a>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="boards-btn" onclick="toggleBoardPanel()">📋 Boards</button>
  <button class="tb-btn" id="new-board-btn" onclick="newBoard()">+ New</button>
  <div class="tb-sep"></div>
  <input id="board-title-inp" type="text" placeholder="Untitled board..." onchange="saveCurrent()">
  <div class="tb-spacer"></div>
  <button class="tb-btn" onclick="exportBoards()">⬇ Export</button>
  <button class="tb-btn" onclick="document.getElementById('imp-file').click()">⬆ Import</button>
  <input type="file" id="imp-file" accept=".json" style="display:none" onchange="importBoards(event)">
  <input type="file" id="upload-file" accept="image/*" style="display:none" onchange="handleUpload(event)">
  <div class="tb-sep"></div>
  <div id="save-ind">Saved ✓</div>
</div>

<!-- TOOL PALETTE -->
<div id="tool-palette">
  <button class="tool-btn active" id="tool-select" onclick="setTool('select')" title="Select (V)">↖</button>
  <button class="tool-btn" id="tool-draw" onclick="setTool('draw')" title="Draw (D)">✏️</button>
  <button class="tool-btn" id="tool-text" onclick="addText()" title="Text (T)">T</button>
  <div class="tool-divider"></div>
  <button class="tool-btn" id="tool-img" onclick="document.getElementById('upload-file').click()" title="Upload image">🖼</button>
  <button class="tool-btn" id="tool-unsplash" onclick="toggleUnsplash()" title="Search Unsplash">🔍</button>
  <button class="tool-btn" id="tool-color" onclick="addColorBlock()" title="Colour block">🎨</button>
  <div class="tool-divider"></div>
  <button class="tool-btn" id="tool-crop" onclick="startCrop()" title="Crop selected image">✂️</button>
  <div class="tool-divider"></div>
  <button class="tool-btn" onclick="undo()" title="Undo (Ctrl+Z)">↩</button>
</div>

<!-- PROPERTIES PANEL -->
<div id="prop-panel">
  <!-- filled dynamically -->
</div>

<!-- BOARD PANEL -->
<div id="board-overlay" onclick="closeBoardPanel()"></div>
<div id="board-panel">
  <div class="bp-header">
    🎨 Boards
    <button class="bp-close" onclick="closeBoardPanel()">✕</button>
  </div>
  <button class="bp-new" onclick="newBoard()">+ New Board</button>
  <div class="bp-list" id="bp-list"></div>
</div>

<!-- CANVAS -->
<div id="canvas-wrap">
  <div id="canvas-bg"></div>
  <div id="canvas" ondragover="event.preventDefault()" ondrop="handleDrop(event)"></div>
  <canvas id="draw-canvas"></canvas>
  <div id="empty-state">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
      <path d="M8 40 L16 28 L24 34 L32 20 L40 28" stroke="rgba(232,200,122,0.5)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="16" cy="16" r="6" stroke="rgba(232,200,122,0.3)" stroke-width="1" fill="none"/>
    </svg>
    <p>Upload images, search Unsplash,<br>draw, add text or colour blocks.</p>
  </div>
  <div id="crop-overlay">
    <div id="crop-box">
      <div class="crop-handle ch-nw"></div>
      <div class="crop-handle ch-ne"></div>
      <div class="crop-handle ch-sw"></div>
      <div class="crop-handle ch-se"></div>
    </div>
  </div>
</div>

<!-- UNSPLASH PANEL -->
<div id="unsplash-panel">
  <div class="us-row">
    <input class="us-input" id="us-input" type="text" placeholder="botanical, moon...">
    <button class="us-go" onclick="searchUnsplash()">Go</button>
  </div>
  <div class="us-grid" id="us-grid"><div class="us-loading">Search above ✨</div></div>
</div>

<!-- CONTEXT MENU -->
<div id="ctx-menu">
  <div class="ctx-item" onclick="ctxAction('front')">⬆ Bring to front</div>
  <div class="ctx-item" onclick="ctxAction('back')">⬇ Send to back</div>
  <div class="ctx-item" onclick="ctxAction('forward')">↑ Forward one</div>
  <div class="ctx-item" onclick="ctxAction('backward')">↓ Back one</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="ctxAction('duplicate')">⧉ Duplicate</div>
  <div class="ctx-item" onclick="ctxAction('crop')" id="ctx-crop" style="display:none">✂️ Crop</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" onclick="ctxAction('delete')">✕ Delete</div>
</div>

<script>
const UNSPLASH_KEY = 'KhI--Ob-uAGi5aCpG6Hv1j2-RNwGpEBchdgAXnn6OR0';

// ══ STAR FIELD ══
const sc=document.getElementById('star-canvas'),sctx=sc.getContext('2d');
let STARS=[],stTick=0,SHOOTERS=[];
function rsz(){sc.width=window.innerWidth;sc.height=window.innerHeight;}rsz();window.addEventListener('resize',()=>{rsz();initS();});
function initS(){STARS=[];const n=Math.floor(sc.width*sc.height/3500);for(let i=0;i<n;i++)STARS.push({x:Math.random()*sc.width,y:Math.random()*sc.height,r:Math.random()*1.1+0.1,o:Math.random()*0.4+0.1,ts:Math.random()*0.018+0.003,to:Math.random()*Math.PI*2,c:['255,255,255','220,200,255','196,200,255'][Math.floor(Math.random()*3)]});}
function animS(){sctx.clearRect(0,0,sc.width,sc.height);stTick+=0.016;STARS.forEach(s=>{const tw=Math.sin(stTick*s.ts*60+s.to)*0.3+0.7;sctx.beginPath();sctx.arc(s.x,s.y,s.r,0,Math.PI*2);sctx.fillStyle=`rgba(${s.c},${s.o*tw})`;sctx.fill();});for(let i=SHOOTERS.length-1;i>=0;i--){const s=SHOOTERS[i],sp=Math.hypot(s.vx,s.vy),tx=s.x-(s.vx/sp)*s.len*s.life,ty=s.y-(s.vy/sp)*s.len*s.life;const g=sctx.createLinearGradient(tx,ty,s.x,s.y);g.addColorStop(0,`rgba(255,255,255,0)`);g.addColorStop(0.6,`rgba(255,255,255,${s.life*0.3})`);g.addColorStop(1,`rgba(255,255,255,${s.life})`);sctx.beginPath();sctx.moveTo(tx,ty);sctx.lineTo(s.x,s.y);sctx.strokeStyle=g;sctx.lineWidth=s.life*1.8;sctx.lineCap='round';sctx.stroke();s.x+=s.vx;s.y+=s.vy;s.life-=s.decay;if(s.life<=0)SHOOTERS.splice(i,1);}requestAnimationFrame(animS);}
function spawnShooter(){SHOOTERS.push({x:Math.random()*sc.width*0.7,y:Math.random()*sc.height*0.4,vx:Math.random()*7+5,vy:Math.random()*4+2,len:Math.random()*100+70,life:1,decay:Math.random()*0.015+0.01});}
initS();animS();setTimeout(()=>spawnShooter(),1200);function sched(){setTimeout(()=>{spawnShooter();sched();},Math.random()*6000+3000);}sched();

// ══ DRAW CANVAS ══
const dc=document.getElementById('draw-canvas');
const dctx=dc.getContext('2d');
let isDrawing=false,lastDX=0,lastDY=0,drawPaths=[];

function resizeDC(){
  // Save existing drawing
  const imgData = dc.width > 0 ? dc.toDataURL() : null;
  dc.width = window.innerWidth;
  dc.height = window.innerHeight - 52;
  // Restore drawing after resize
  if(imgData){const img=new Image();img.onload=()=>dctx.drawImage(img,0,0);img.src=imgData;}
}
window.addEventListener('resize', resizeDC);
resizeDC();

dc.addEventListener('mousedown',e=>{
  if(currentTool!=='draw') return;
  isDrawing=true;
  const r=dc.getBoundingClientRect();
  lastDX=e.clientX-r.left; lastDY=e.clientY-r.top;
  dctx.beginPath(); dctx.moveTo(lastDX,lastDY);
  pushUndo();
});
dc.addEventListener('mousemove',e=>{
  if(!isDrawing) return;
  const r=dc.getBoundingClientRect();
  const x=e.clientX-r.left, y=e.clientY-r.top;
  dctx.lineWidth=drawSize; dctx.strokeStyle=drawMode==='erase'?'rgba(0,0,0,1)':drawColor;
  dctx.lineCap='round'; dctx.lineJoin='round';
  if(drawMode==='erase') dctx.globalCompositeOperation='destination-out';
  else dctx.globalCompositeOperation='source-over';
  dctx.lineTo(x,y); dctx.stroke(); dctx.beginPath(); dctx.moveTo(x,y);
  lastDX=x; lastDY=y;
});
dc.addEventListener('mouseup',()=>{isDrawing=false;dctx.globalCompositeOperation='source-over';saveCurrent();});
dc.addEventListener('touchstart',e=>{e.preventDefault();if(currentTool!=='draw')return;isDrawing=true;const r=dc.getBoundingClientRect(),t=e.touches[0];lastDX=t.clientX-r.left;lastDY=t.clientY-r.top;dctx.beginPath();dctx.moveTo(lastDX,lastDY);pushUndo();},{passive:false});
dc.addEventListener('touchmove',e=>{e.preventDefault();if(!isDrawing)return;const r=dc.getBoundingClientRect(),t=e.touches[0],x=t.clientX-r.left,y=t.clientY-r.top;dctx.lineWidth=drawSize;dctx.strokeStyle=drawMode==='erase'?'rgba(0,0,0,1)':drawColor;dctx.lineCap='round';dctx.lineJoin='round';if(drawMode==='erase')dctx.globalCompositeOperation='destination-out';else dctx.globalCompositeOperation='source-over';dctx.lineTo(x,y);dctx.stroke();dctx.beginPath();dctx.moveTo(x,y);},{passive:false});
dc.addEventListener('touchend',()=>{isDrawing=false;dctx.globalCompositeOperation='source-over';saveCurrent();});

// Save draw canvas to current board
function saveDrawing(){
  const b=boards.find(x=>x.id===currentId);
  if(b) b.drawing=dc.toDataURL();
}
function loadDrawing(src){
  dctx.clearRect(0,0,dc.width,dc.height);
  if(!src) return;
  const img=new Image();img.onload=()=>dctx.drawImage(img,0,0);img.src=src;
}
function clearDrawing(){dctx.clearRect(0,0,dc.width,dc.height);saveCurrent();}

// ══ TOOL MANAGEMENT ══
function setTool(t){
  currentTool=t;
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tool-'+t)?.classList.add('active');
  dc.classList.toggle('drawing', t==='draw');

  if(t!=='draw') updatePropPanel();
}

// ══ BOARD MANAGEMENT ══
function newBoard(){
  const id='b'+Date.now();
  boards.unshift({id,title:'',items:[],drawing:null,theme:'midnight',moods:[],createdAt:new Date().toISOString()});
  saveBoards();loadBoard(id);renderBoardList();
  document.getElementById('board-title-inp').focus();
  closeBoardPanel();
}
function loadBoard(id){
  currentId=id;selectedId=null;
  const b=boards.find(x=>x.id===id);
  if(!b)return;
  document.getElementById('board-title-inp').value=b.title||'';
  applyTheme(b.theme||'midnight');
  renderCanvas();
  setTimeout(()=>{resizeDC();loadDrawing(b.drawing);},50);
  renderBoardList();
  updateEmptyState();
}
function saveCurrent(){
  if(!currentId)return;
  const b=boards.find(x=>x.id===currentId);
  if(!b)return;
  b.title=document.getElementById('board-title-inp').value;
  b.drawing=dc.toDataURL();
  saveBoards();
}
function saveBoards(){try{localStorage.setItem('sketchbook2',JSON.stringify(boards));}catch(e){}flashSaved();}
function loadBoards(){try{boards=JSON.parse(localStorage.getItem('sketchbook2')||'[]');}catch(e){boards=[];}renderBoardList();if(boards.length)loadBoard(boards[0].id);else newBoard();}
let saveTimer=null;function schedSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveCurrent,600);}
function flashSaved(){const el=document.getElementById('save-ind');el.classList.add('on');setTimeout(()=>el.classList.remove('on'),1800);}

function renderBoardList(){
  const list=document.getElementById('bp-list');
  if(!boards.length){list.innerHTML='<div class="bp-empty">No boards yet. Create one! 🌿</div>';return;}
  list.innerHTML='';
  boards.forEach(b=>{
    const el=document.createElement('div');el.className='bp-item'+(b.id===currentId?' active':'');
    el.innerHTML=`<div class="bp-item-name">${b.title||'Untitled'}</div><div class="bp-item-meta">${b.items?.length||0} items</div>`;
    el.addEventListener('click',()=>{loadBoard(b.id);closeBoardPanel();});
    // Delete on right-click
    el.addEventListener('contextmenu',e=>{e.preventDefault();if(confirm('Delete this board?')){boards=boards.filter(x=>x.id!==b.id);if(currentId===b.id){if(boards.length)loadBoard(boards[0].id);else newBoard();}saveBoards();renderBoardList();}});
    list.appendChild(el);
  });
}
function toggleBoardPanel(){document.getElementById('board-panel').classList.toggle('open');document.getElementById('board-overlay').classList.toggle('open');}
function closeBoardPanel(){document.getElementById('board-panel').classList.remove('open');document.getElementById('board-overlay').classList.remove('open');}

// ══ UNDO ══
function pushUndo(){
  if(!currentId)return;
  const b=boards.find(x=>x.id===currentId);
  if(!b)return;
  undoStack.push({items:JSON.parse(JSON.stringify(b.items)),drawing:dc.toDataURL()});
  if(undoStack.length>30)undoStack.shift();
}
function undo(){
  if(!undoStack.length)return;
  const state=undoStack.pop();
  const b=boards.find(x=>x.id===currentId);
  if(!b)return;
  b.items=state.items;
  renderCanvas();
  loadDrawing(state.drawing);
  saveCurrent();
}

// ══ CANVAS RENDERING ══
function renderCanvas(){
  const canvas=document.getElementById('canvas');
  [...canvas.querySelectorAll('.ci')].forEach(el=>el.remove());
  const b=boards.find(x=>x.id===currentId);
  if(!b)return;
  b.items.sort((a,z)=>a.z-z.z).forEach(item=>{
    if(item.type==='image') addImageToCanvas(item);
    else if(item.type==='text') addTextToCanvas(item);
    else if(item.type==='color') addColorToCanvas(item);
  });
  updateEmptyState();
}

function updateEmptyState(){
  const b=boards.find(x=>x.id===currentId);
  document.getElementById('empty-state').style.display=(!b||!b.items?.length)?'flex':'none';
}

// ══ ITEM CREATION ══
function mkItem(type,extra={}){
  return{id:'i'+Date.now()+Math.random(),type,x:80+Math.random()*200,y:80+Math.random()*150,w:200,h:160,rot:0,z:nextZ(),...extra};
}
function nextZ(){const b=boards.find(x=>x.id===currentId);return b?Math.max(0,...(b.items||[]).map(i=>i.z||0))+1:1;}

function addItemToBoard(item){
  const b=boards.find(x=>x.id===currentId);
  if(!b)return;
  pushUndo();
  b.items.push(item);
  if(item.type==='image')addImageToCanvas(item);
  else if(item.type==='text')addTextToCanvas(item);
  else if(item.type==='color')addColorToCanvas(item);
  updateEmptyState();schedSave();
  selectItem(item.id);
}

// ══ MOUNT ITEM (drag, resize, rotate, select) ══
function mountItem(el,item){
  // Select on click
  el.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('handle')&&!e.target.classList.contains('h-rot')&&!e.target.classList.contains('h-del'))return;
    if(e.target.classList.contains('h-del'))return;
    if(e.target.tagName==='TEXTAREA'&&el.classList.contains('selected'))return;
    selectItem(item.id);
  });

  // Right-click context menu
  el.addEventListener('contextmenu',e=>{e.preventDefault();selectItem(item.id);showCtxMenu(e.clientX,e.clientY,item);});

  // DRAG
  let dragging=false,ox=0,oy=0;
  el.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('handle'))return;
    if(e.target.tagName==='TEXTAREA'&&el.classList.contains('selected'))return;
    dragging=true;ox=e.clientX-item.x;oy=e.clientY-item.y;
    el.style.transition='none';e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    item.x=e.clientX-ox;item.y=e.clientY-oy;
    el.style.left=item.x+'px';el.style.top=item.y+'px';
  });
  document.addEventListener('mouseup',()=>{if(dragging){dragging=false;schedSave();}});

  // RESIZE (8 handles)
  const handles={
    'h-se':(dx,dy,sx,sy,sw,sh)=>({w:Math.max(30,sw+dx),h:Math.max(20,sh+dy)}),
    'h-sw':(dx,dy,sx,sy,sw,sh)=>({x:sx+dx,w:Math.max(30,sw-dx),h:Math.max(20,sh+dy)}),
    'h-ne':(dx,dy,sx,sy,sw,sh)=>({y:sy+dy,w:Math.max(30,sw+dx),h:Math.max(20,sh-dy)}),
    'h-nw':(dx,dy,sx,sy,sw,sh)=>({x:sx+dx,y:sy+dy,w:Math.max(30,sw-dx),h:Math.max(20,sh-dy)}),
    'h-e': (dx,dy,sx,sy,sw,sh)=>({w:Math.max(30,sw+dx)}),
    'h-w': (dx,dy,sx,sy,sw,sh)=>({x:sx+dx,w:Math.max(30,sw-dx)}),
    'h-s': (dx,dy,sx,sy,sw,sh)=>({h:Math.max(20,sh+dy)}),
    'h-n': (dx,dy,sx,sy,sw,sh)=>({y:sy+dy,h:Math.max(20,sh-dy)}),
  };
  el.querySelectorAll('.handle:not(.h-rot):not(.h-del)').forEach(h=>{
    const hClass=[...h.classList].find(c=>c.startsWith('h-')&&c!=='handle');
    let resizing=false,mx0=0,my0=0,sx0=0,sy0=0,sw0=0,sh0=0;
    h.addEventListener('mousedown',e=>{
      resizing=true;mx0=e.clientX;my0=e.clientY;sx0=item.x;sy0=item.y;sw0=item.w;sh0=item.h;
      e.stopPropagation();e.preventDefault();pushUndo();
    });
    document.addEventListener('mousemove',e=>{
      if(!resizing)return;
      const upd=handles[hClass]?.(e.clientX-mx0,e.clientY-my0,sx0,sy0,sw0,sh0);
      if(!upd)return;
      if(upd.x!==undefined){item.x=upd.x;el.style.left=item.x+'px';}
      if(upd.y!==undefined){item.y=upd.y;el.style.top=item.y+'px';}
      if(upd.w!==undefined){item.w=upd.w;el.style.width=item.w+'px';}
      if(upd.h!==undefined){item.h=upd.h;el.style.height=item.h+'px';}
    });
    document.addEventListener('mouseup',()=>{if(resizing){resizing=false;schedSave();}});
  });

  // ROTATE
  const rotH=el.querySelector('.h-rot');
  let rotating=false,rotStartAngle=0,rotStartRot=0;
  rotH.addEventListener('mousedown',e=>{
    rotating=true;
    const cx=item.x+item.w/2,cy=item.y+item.h/2;
    rotStartAngle=Math.atan2(e.clientY-cy,e.clientX-cx)*(180/Math.PI);
    rotStartRot=item.rot||0;
    e.stopPropagation();e.preventDefault();pushUndo();
  });
  document.addEventListener('mousemove',e=>{
    if(!rotating)return;
    const cx=item.x+item.w/2,cy=item.y+item.h/2;
    const angle=Math.atan2(e.clientY-cy,e.clientX-cx)*(180/Math.PI);
    item.rot=rotStartRot+(angle-rotStartAngle);
    el.style.transform=`rotate(${item.rot}deg)`;
  });
  document.addEventListener('mouseup',()=>{if(rotating){rotating=false;schedSave();}});
}

// ══ SELECT ══
function selectItem(id){
  selectedId=id;
  document.querySelectorAll('.ci').forEach(el=>{
    el.classList.toggle('selected',el.dataset.id===id);
    if(el.dataset.id===id) el.style.zIndex=999;
    else{const it=getItem(el.dataset.id);if(it)el.style.zIndex=it.z||1;}
  });
  updatePropPanel();
}

document.getElementById('canvas-wrap').addEventListener('mousedown',e=>{
  if(e.target===document.getElementById('canvas')||e.target===document.getElementById('canvas-bg')||e.target===document.getElementById('empty-state')){
    selectedId=null;document.querySelectorAll('.ci.selected').forEach(el=>el.classList.remove('selected'));
    updatePropPanel();
  }
  hideCtxMenu();
});

function getItem(id){const b=boards.find(x=>x.id===currentId);return b?.items?.find(i=>i.id===id);}

function deleteItem(id){
  const b=boards.find(x=>x.id===currentId);if(!b)return;
  pushUndo();
  b.items=b.items.filter(i=>i.id!==id);
  document.querySelector(`[data-id="${id}"]`)?.remove();
  if(selectedId===id){selectedId=null;updatePropPanel();}
  updateEmptyState();schedSave();
}

    html+=`<div class="prop-label">Colour</div>
    <div class="color-grid" id="prop-color-grid"></div>
    <div class="prop-row"><input type="color" value="${item.color}" style="width:32px;height:24px;border:none;background:transparent;cursor:pointer;" onchange="setItemColor(this.value)"><span style="font-family:'Cormorant Garamond',serif;font-size:12px;color:var(--text-muted);margin-left:6px;">Custom</span></div>`;
  }
  if(item.type==='text'){
    html+=`<div class="prop-label">Font Size</div>
    <div class="prop-row"><input class="prop-input" type="number" value="${item.fontSize||20}" min="8" max="120" onchange="setFontSize(this.value)"></div>
    <div class="prop-label">Font</div>
    <div class="font-row" id="prop-font-row"></div>
    <div class="prop-label">Text Colour</div>
    <div class="color-grid" id="prop-text-color-grid"></div>
    <div class="prop-row"><input type="color" value="${item.color||'#f4f0e6'}" style="width:32px;height:24px;border:none;background:transparent;cursor:pointer;" onchange="setTextColor(this.value)"><span style="font-family:'Cormorant Garamond',serif;font-size:12px;color:var(--text-muted);margin-left:6px;">Custom</span></div>`;
  }
  if(item.type==='image'){
    html+=`<button class="prop-btn" onclick="startCrop()" style="width:100%;text-align:center;">✂️ Crop Image</button>
    <div class="prop-label">Opacity</div>
    <input class="size-slider" type="range" min="10" max="100" value="${Math.round((item.opacity||1)*100)}" oninput="setOpacity(this.value)">`;
  }

  html+=`<div class="prop-label">Background</div>
  <div class="color-grid" id="prop-theme-grid"></div>`;

  html+=`<button class="prop-btn danger" onclick="deleteItem('${item.id}')" style="width:100%;text-align:center;margin-top:4px;border-color:rgba(201,122,154,0.3);color:var(--rose);">✕ Delete</button>`;

  panel.innerHTML=html;

  // Build colour swatches
  if(item.type==='color'){
    const g=document.getElementById('prop-color-grid');
    PALETTE.forEach(c=>{const s=document.createElement('div');s.className='color-swatch'+(c===item.color?' active':'');s.style.background=c;s.onclick=()=>{setItemColor(c);g.querySelectorAll('.color-swatch').forEach(x=>x.classList.remove('active'));s.classList.add('active');};g.appendChild(s);});
  }
  if(item.type==='text'){
    const g=document.getElementById('prop-text-color-grid');
    PALETTE.forEach(c=>{const s=document.createElement('div');s.className='color-swatch'+(c===item.color?' active':'');s.style.background=c;s.onclick=()=>{setTextColor(c);g.querySelectorAll('.color-swatch').forEach(x=>x.classList.remove('active'));s.classList.add('active');};g.appendChild(s);});
    const fr=document.getElementById('prop-font-row');
    FONTS.forEach(f=>{const b=document.createElement('button');b.className='font-btn'+(f===item.fontFamily?' active':'');b.style.fontFamily=f;b.textContent=f.split(' ')[0];b.onclick=()=>{setFont(f);fr.querySelectorAll('.font-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');};fr.appendChild(b);});
  }

  // Theme swatches
  const tg=document.getElementById('prop-theme-grid');
  const b=boards.find(x=>x.id===currentId);
  THEMES.forEach(t=>{const s=document.createElement('div');s.className='theme-swatch'+(b?.theme===t.id?' active':'');s.style.background=t.bg;s.title=t.id;s.onclick=()=>{applyTheme(t.id);const bb=boards.find(x=>x.id===currentId);if(bb)bb.theme=t.id;tg.querySelectorAll('.theme-swatch').forEach(x=>x.classList.remove('active'));s.classList.add('active');schedSave();};tg.appendChild(s);});
}

function layerAction(dir){
  const item=getItem(selectedId);if(!item)return;
  const b=boards.find(x=>x.id===currentId);if(!b)return;
  pushUndo();
  const sorted=b.items.slice().sort((a,z)=>a.z-z.z);
  const idx=sorted.findIndex(i=>i.id===item.id);
  if(dir==='front')item.z=nextZ();
  else if(dir==='back')item.z=Math.min(...b.items.map(i=>i.z))-1;
  else if(dir==='forward'&&idx<sorted.length-1){const above=sorted[idx+1];const tmp=item.z;item.z=above.z;above.z=tmp;}
  else if(dir==='backward'&&idx>0){const below=sorted[idx-1];const tmp=item.z;item.z=below.z;below.z=tmp;}
  renderCanvas();selectItem(selectedId);schedSave();
}

function setRotation(val){
  const item=getItem(selectedId);if(!item)return;
  item.rot=parseFloat(val)||0;
  const el=document.querySelector(`[data-id="${item.id}"]`);
  if(el)el.style.transform=`rotate(${item.rot}deg)`;
  schedSave();
}
function setSize(axis,val){
  const item=getItem(selectedId);if(!item)return;
  item[axis]=Math.max(20,parseFloat(val)||20);
  const el=document.querySelector(`[data-id="${item.id}"]`);
  if(el)el.style[axis==='w'?'width':'height']=item[axis]+'px';
  schedSave();
}
function setItemColor(c){
  const item=getItem(selectedId);if(!item||item.type!=='color')return;
  item.color=c;
  const el=document.querySelector(`[data-id="${item.id}"]`)?.querySelector('.ci-color-inner');
  if(el)el.style.background=c;
  schedSave();
}
function setFontSize(v){
  const item=getItem(selectedId);if(!item||item.type!=='text')return;
  item.fontSize=parseInt(v)||20;
  const el=document.querySelector(`[data-id="${item.id}"]`);
  if(el)el.style.fontSize=item.fontSize+'px';
  schedSave();
}
function setFont(f){
  const item=getItem(selectedId);if(!item||item.type!=='text')return;
  item.fontFamily=f;
  const el=document.querySelector(`[data-id="${item.id}"]`);
  if(el)el.style.fontFamily=`'${f}',serif`;
  schedSave();
}
function setTextColor(c){
  const item=getItem(selectedId);if(!item||item.type!=='text')return;
  item.color=c;
  const el=document.querySelector(`[data-id="${item.id}"]`);
  if(el)el.style.color=c;
  schedSave();
}
function setOpacity(v){
  const item=getItem(selectedId);if(!item)return;
  item.opacity=parseInt(v)/100;
  const el=document.querySelector(`[data-id="${item.id}"]`);
  if(el)el.style.opacity=item.opacity;
  schedSave();
}

// ══ CONTEXT MENU ══
let ctxItem=null;
function showCtxMenu(x,y,item){
  ctxItem=item;
  const m=document.getElementById('ctx-menu');
  document.getElementById('ctx-crop').style.display=item.type==='image'?'flex':'none';
  m.style.left=x+'px';m.style.top=y+'px';m.style.display='block';
}
function hideCtxMenu(){document.getElementById('ctx-menu').style.display='none';}
function ctxAction(act){
  if(!ctxItem)return;
  if(act==='delete')deleteItem(ctxItem.id);
  else if(act==='duplicate'){
    const b=boards.find(x=>x.id===currentId);
    const orig=getItem(ctxItem.id);
    if(!orig)return;
    const copy=JSON.parse(JSON.stringify(orig));
    copy.id='i'+Date.now();copy.x+=20;copy.y+=20;copy.z=nextZ();
    pushUndo();b.items.push(copy);
    if(copy.type==='image')addImageToCanvas(copy);
    else if(copy.type==='text')addTextToCanvas(copy);
    else if(copy.type==='color')addColorToCanvas(copy);
    schedSave();updateEmptyState();
  }
  else if(act==='front'||act==='back'||act==='forward'||act==='backward'){selectItem(ctxItem.id);layerAction(act);}
  else if(act==='crop'){selectItem(ctxItem.id);startCrop();}
  hideCtxMenu();
}
document.addEventListener('click',hideCtxMenu);

// ══ CROP ══
function startCrop(){
  const item=getItem(selectedId);
  if(!item||item.type!=='image'){alert('Select an image first.');return;}
  cropTarget=item;
  const el=document.querySelector(`[data-id="${item.id}"]`);
  const overlay=document.getElementById('crop-overlay');
  const box=document.getElementById('crop-box');
  // Position crop box over the image element
  box.style.left='20%';box.style.top='20%';box.style.width='60%';box.style.height='60%';
  overlay.classList.add('active');
  // Confirm button
  const existing=document.getElementById('crop-confirm-btn');
  if(existing)existing.remove();
  const btn=document.createElement('button');
  btn.id='crop-confirm-btn';
  btn.style.cssText='position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(232,200,122,0.9);border:none;border-radius:20px;padding:10px 28px;font-family:\'Cormorant Garamond\',serif;font-size:15px;cursor:pointer;color:#07070f;z-index:200;';
  btn.textContent='✓ Apply Crop';
  btn.onclick=applyCrop;
  overlay.appendChild(btn);
  // Cancel
  const cancel=document.createElement('button');
  cancel.style.cssText='position:absolute;bottom:20px;left:calc(50% + 110px);background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:10px 20px;font-family:\'Cormorant Garamond\',serif;font-size:15px;cursor:pointer;color:white;z-index:200;';
  cancel.textContent='Cancel';
  cancel.onclick=cancelCrop;
  overlay.appendChild(cancel);
  // Make crop box draggable/resizable
  makeCropBoxInteractive();
}

function makeCropBoxInteractive(){
  const box=document.getElementById('crop-box');
  let dragging=false,ox=0,oy=0;
  box.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('crop-handle'))return;
    dragging=true;ox=e.clientX-box.offsetLeft;oy=e.clientY-box.offsetTop;e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    box.style.left=(e.clientX-ox)+'px';box.style.top=(e.clientY-oy)+'px';
  });
  document.addEventListener('mouseup',()=>{dragging=false;});
  // Resize handles
  box.querySelectorAll('.crop-handle').forEach(h=>{
    let rx=false,mx0=0,my0=0,bl=0,bt=0,bw=0,bh=0;
    h.addEventListener('mousedown',e=>{rx=true;mx0=e.clientX;my0=e.clientY;bl=box.offsetLeft;bt=box.offsetTop;bw=box.offsetWidth;bh=box.offsetHeight;e.stopPropagation();e.preventDefault();});
    document.addEventListener('mousemove',e=>{
      if(!rx)return;
      const dx=e.clientX-mx0,dy=e.clientY-my0;
      const hc=[...h.classList].find(c=>c.startsWith('ch-'));
      if(hc==='ch-se'){box.style.width=Math.max(40,bw+dx)+'px';box.style.height=Math.max(40,bh+dy)+'px';}
      else if(hc==='ch-sw'){box.style.left=(bl+dx)+'px';box.style.width=Math.max(40,bw-dx)+'px';box.style.height=Math.max(40,bh+dy)+'px';}
      else if(hc==='ch-ne'){box.style.top=(bt+dy)+'px';box.style.width=Math.max(40,bw+dx)+'px';box.style.height=Math.max(40,bh-dy)+'px';}
      else if(hc==='ch-nw'){box.style.left=(bl+dx)+'px';box.style.top=(bt+dy)+'px';box.style.width=Math.max(40,bw-dx)+'px';box.style.height=Math.max(40,bh-dy)+'px';}
    });
    document.addEventListener('mouseup',()=>{rx=false;});
  });
}

function applyCrop(){
  if(!cropTarget)return;
  const overlay=document.getElementById('crop-overlay');
  const box=document.getElementById('crop-box');
  const el=document.querySelector(`[data-id="${cropTarget.id}"]`);
  if(!el)return;
  // Get crop box rect relative to the image element
  const elRect=el.getBoundingClientRect();
  const boxRect=box.getBoundingClientRect();
  // Calculate crop as percentage of original image
  const pctX=(boxRect.left-elRect.left)/elRect.width;
  const pctY=(boxRect.top-elRect.top)/elRect.height;
  const pctW=boxRect.width/elRect.width;
  const pctH=boxRect.height/elRect.height;
  // Apply via object-position and object-fit on the img
  const img=el.querySelector('img');
  if(img){
    img.style.objectPosition=`${-pctX/pctW*100}% ${-pctY/pctH*100}%`;
    img.style.transform=`scale(${1/pctW}, ${1/pctH})`;
    img.style.transformOrigin='top left';
    cropTarget.cropX=pctX;cropTarget.cropY=pctY;cropTarget.cropW=pctW;cropTarget.cropH=pctH;
  }
  cancelCrop();schedSave();
}

function cancelCrop(){
  cropTarget=null;
  const overlay=document.getElementById('crop-overlay');
  overlay.classList.remove('active');
  document.getElementById('crop-confirm-btn')?.remove();
  overlay.querySelectorAll('button').forEach(b=>b.remove());
}

// ══ THEME ══
function applyTheme(id){
  const t=THEMES.find(x=>x.id===id)||THEMES[0];
  document.getElementById('canvas-bg').style.background=t.grad;
}

// ══ UPLOAD ══
function handleUpload(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>addImageItem(ev.target.result);
  reader.readAsDataURL(file);e.target.value='';
}
function handleDrop(e){
  e.preventDefault();
  [...e.dataTransfer.files].forEach(file=>{if(file.type.startsWith('image/')){const r=new FileReader();r.onload=ev=>addImageItem(ev.target.result);r.readAsDataURL(file);}});
}

// ══ UNSPLASH ══
function toggleUnsplash(){document.getElementById('unsplash-panel').classList.toggle('open');}
document.getElementById('us-input').addEventListener('keydown',e=>{if(e.key==='Enter')searchUnsplash();});
async function searchUnsplash(){
  if(!currentId){alert('Create a board first.');return;}
  const q=document.getElementById('us-input').value.trim();if(!q)return;
  const g=document.getElementById('us-grid');
  g.innerHTML='<div class="us-loading">Searching... ✨</div>';
  try{
    const res=await fetch(`https://api.unsplash.com/search/photos?query=${encodeURIComponent(q)}&per_page=12&orientation=squarish`,{headers:{Authorization:`Client-ID ${UNSPLASH_KEY}`}});
    const data=await res.json();
    g.innerHTML='';
    if(!data.results?.length){g.innerHTML='<div class="us-loading">No results. Try another search.</div>';return;}
    data.results.forEach(photo=>{
      const d=document.createElement('div');d.className='us-thumb';
      d.innerHTML=`<img src="${photo.urls.thumb}" loading="lazy">`;
      d.addEventListener('click',()=>{
        addImageItem(photo.urls.regular);
        fetch(`${photo.links.download_location}&client_id=${UNSPLASH_KEY}`);
      });
      g.appendChild(d);
    });
  }catch(e){g.innerHTML='<div class="us-loading">Error. Try again.</div>';}
}

// ══ EXPORT / IMPORT ══
function exportBoards(){
  const data={sketchbook2:JSON.stringify(boards)};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='sketchbook-backup-'+new Date().toISOString().split('T')[0]+'.json';
  a.click();URL.revokeObjectURL(a.href);
}
function importBoards(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{const d=JSON.parse(ev.target.result);if(d.sketchbook2){boards=JSON.parse(d.sketchbook2);localStorage.setItem('sketchbook2',d.sketchbook2);renderBoardList();if(boards.length)loadBoard(boards[0].id);alert('Imported 🌿');}}
    catch(err){alert('Something went wrong.');}
    e.target.value='';
  };
  reader.readAsText(file);
}

// ══ DRAW TOOL PROPERTIES ══
// Add draw options dynamically to tool palette when draw mode active
function updateDrawTools(){
  // remove old
  const existing=document.getElementById('draw-props');
  if(existing)existing.remove();
  if(currentTool!=='draw')return;
  const palette=document.getElementById('tool-palette');
  const div=document.createElement('div');div.id='draw-props';
  div.innerHTML=`
    <div class="tool-divider"></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px 0;">
      ${PALETTE.slice(0,8).map(c=>`<div style="width:22px;height:22px;border-radius:50%;background:${c};cursor:pointer;border:2px solid ${c===drawColor?'white':'transparent'};transition:all 0.15s;" onclick="drawColor='${c}';document.querySelectorAll('[data-dc]').forEach(x=>x.style.borderColor='transparent');this.style.borderColor='white'" data-dc></div>`).join('')}
      <input type="color" value="${drawColor}" style="width:22px;height:22px;border:none;background:transparent;cursor:pointer;border-radius:50%;padding:0;" oninput="drawColor=this.value">
    </div>
    <div class="tool-divider"></div>
    <input type="range" min="1" max="30" value="${drawSize}" style="width:26px;writing-mode:vertical-lr;direction:rtl;accent-color:var(--gold);height:60px;" oninput="drawSize=this.value">
    <div class="tool-divider"></div>
    <button class="tool-btn ${drawMode==='pen'?'active':''}" onclick="drawMode='pen';updateDrawTools()" title="Pen">✏️</button>
    <button class="tool-btn ${drawMode==='erase'?'active':''}" onclick="drawMode='erase';updateDrawTools()" title="Eraser">◻</button>
    <button class="tool-btn" onclick="clearDrawing()" title="Clear drawing" style="font-size:12px;">CLR</button>
  `;
  palette.appendChild(div);
}

// Override setTool to also update draw tools
const _setTool=setTool;
window.setTool=function(t){_setTool(t);updateDrawTools();};

// ══ KEYBOARD SHORTCUTS ══
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.key==='v'||e.key==='V')setTool('select');
  if(e.key==='d'||e.key==='D')setTool('draw');
  if(e.key==='t'||e.key==='T')addText();
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();}
  if(e.key==='Delete'||e.key==='Backspace'){if(selectedId){deleteItem(selectedId);}}
  if(e.key==='Escape'){selectedId=null;document.querySelectorAll('.ci.selected').forEach(el=>el.classList.remove('selected'));updatePropPanel();cancelCrop();}
});

// ══ INIT ══
loadBoards();
</script>
