<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ava's Galaxy</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=EB+Garamond:ital,wght@0,400;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --void: #06060e;
  --text: #f0eaf8;
  --text-soft: #b0a8d0;
  --text-muted: #5a5470;
  --gold: #e8c87a;
  --gold-dim: rgba(232,200,122,0.25);
}
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  background: var(--void);
  font-family: 'EB Garamond', serif;
  color: var(--text);
  cursor: default;
}

/* ── MAIN CANVAS ── */
#galaxy-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
}

/* ── TITLE ── */
#site-title {
  position: fixed;
  top: 32px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  z-index: 10;
  pointer-events: none;
}
#site-title h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(22px, 3vw, 32px);
  font-weight: 600;
  background: linear-gradient(135deg, #f0eaf8 0%, #e8c87a 50%, #c4a8d8 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 3px;
  margin-bottom: 6px;
}
#site-title p {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 15px;
  color: var(--text-muted);
  letter-spacing: 1px;
}

/* ── QUOTE ── */
#bottom-quote {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  z-index: 10;
  pointer-events: none;
  white-space: nowrap;
}
#bottom-quote p {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 14px;
  color: var(--text-muted);
}
#bottom-quote cite {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(232,200,122,0.4);
}

/* ── STAR TOOLTIP ── */
#tooltip {
  position: fixed;
  z-index: 20;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s ease;
  transform: translateX(-50%) translateY(-110%);
  text-align: center;
}
#tooltip.visible { opacity: 1; }
#tooltip-name {
  font-family: 'Cinzel', serif;
  font-size: 14px;
  font-weight: 500;
  color: var(--gold);
  display: block;
  margin-bottom: 3px;
  letter-spacing: 1px;
  white-space: nowrap;
}
#tooltip-desc {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--text-soft);
  white-space: nowrap;
}
#tooltip-arrow {
  width: 1px;
  height: 16px;
  background: linear-gradient(to bottom, var(--gold), transparent);
  margin: 6px auto 0;
  opacity: 0.5;
}

/* ── NEBULA LAYERS ── */
.nebula {
  position: fixed;
  border-radius: 50%;
  filter: blur(100px);
  pointer-events: none;
  z-index: 0;
}
.nb1 { width:700px;height:500px;background:radial-gradient(ellipse,rgba(155,106,191,0.18) 0%,transparent 70%);top:-150px;left:-200px; }
.nb2 { width:500px;height:600px;background:radial-gradient(ellipse,rgba(201,122,154,0.12) 0%,transparent 70%);top:30%;right:-200px; }
.nb3 { width:600px;height:300px;background:radial-gradient(ellipse,rgba(104,136,204,0.1) 0%,transparent 70%);bottom:0;left:15%; }
.nb4 { width:400px;height:400px;background:radial-gradient(ellipse,rgba(232,200,122,0.06) 0%,transparent 70%);bottom:-100px;right:10%; }
</style>
</head>
<body>

<div class="nebula nb1"></div>
<div class="nebula nb2"></div>
<div class="nebula nb3"></div>
<div class="nebula nb4"></div>

<canvas id="galaxy-canvas"></canvas>

<div id="site-title">
  <h1>AVA'S GALAXY</h1>
  <p>A dreamy little corner of the universe</p>
</div>

<div id="tooltip">
  <span id="tooltip-name"></span>
  <span id="tooltip-desc"></span>
  <div id="tooltip-arrow"></div>
</div>

<div id="bottom-quote">
  <p>Not just beautiful, though — the stars are like the trees in the forest, alive and breathing.</p>
  <cite>— Haruki Murakami · Ava's Galaxy</cite>
</div>

<script>
// ══════════════════════════════════════════════════════
// PAGES — each one is a star in the constellation
// ══════════════════════════════════════════════════════
// Positions are in % of canvas (0–1), hand-placed to form a beautiful map
const PAGES = [
  // Core cluster — centre-left
  { name:'The Diary',       desc:'Daily reflections & moods',        url:'🌿_My_Diary.html',       color:'#9abea2', r:9,  x:0.32, y:0.44 },
  { name:'The Paper Garden',desc:'Book reviews & thoughts',          url:'📖_Book_Review.html',     color:'#c4a880', r:8,  x:0.24, y:0.34 },
  { name:'The Picture House',desc:'Film reviews & memories',         url:'🎬_Movie_Review.html',    color:'#c890b8', r:8,  x:0.20, y:0.55 },

  // Spiritual cluster — right
  { name:'The Moon Garden', desc:'Tarot readings & journal',         url:'tarot.html',              color:'#e8c87a', r:11, x:0.72, y:0.38 },
  { name:'The Grimoire',    desc:'Spells, rituals & tradition',      url:'grimoire.html',           color:'#c4a050', r:9,  x:0.82, y:0.55 },

  // Creative cluster — lower centre
  { name:'The Sketchbook',  desc:'Mood boards & visual diary',       url:'sketchbook.html',         color:'#e8a8c0', r:8,  x:0.50, y:0.68 },

  // Life cluster — upper
  { name:'The Garden Calendar', desc:'Moon phases, habits & time',  url:'calendar.html',           color:'#a8c0e8', r:9,  x:0.55, y:0.28 },

  // New pages
  { name:'The Treasury',    desc:'Budget & financial intentions',   url:'budget.html',             color:'#e8c87a', r:8,  x:0.38, y:0.20 },
  { name:'The Kitchen',     desc:'Meal planning & recipes',         url:'meals.html',              color:'#c4a880', r:7,  x:0.18, y:0.72 },
  { name:'The Roadmap',     desc:'Year-long goals & daily planner', url:'planner.html',            color:'#c4a8d8', r:8,  x:0.48, y:0.48 },
  { name:'The Morning Star',desc:'Daily routine & north star',      url:'morning.html',            color:'#e8c87a', r:10, x:0.62, y:0.58 },
  { name:'The Wardrobe',    desc:'Capsule · style · brands',        url:'wardrobe.html',           color:'#c890b8', r:9,  x:0.35, y:0.60 },
  { name:'The Training Grounds', desc:'Pilates · movement · strength',  url:'training.html',           color:'#9abea2', r:9,  x:0.55, y:0.72 },
  { name:'The Closet',      desc:'Wishlist · closet · outfits',       url:'closet.html',             color:'#c890b8', r:9,  x:0.25, y:0.72 },
];

// Constellation lines — pairs of page indices to connect
const LINES = [
  [0, 1], // Diary — Paper Garden
  [0, 2], // Diary — Picture House
  [0, 6], // Diary — Calendar
  [1, 3], // Paper Garden — Moon Garden
  [3, 4], // Moon Garden — Grimoire
  [0, 5], // Diary — Sketchbook
  [5, 4], // Sketchbook — Grimoire
  [3, 6], // Moon Garden — Calendar
  [2, 5], // Picture House — Sketchbook
  [6, 7], // Calendar — Treasury
  [0, 7], // Diary — Treasury
  [2, 8], // Picture House — Kitchen
  [0, 8], // Diary — Kitchen
  [0, 9], // Diary — Roadmap
  [6, 9], // Calendar — Roadmap
  [7, 9], // Treasury — Roadmap
  [9, 10], // Roadmap — Morning Star
  [6, 10], // Calendar — Morning Star
  [0, 11], // Diary — Wardrobe
  [9, 11], // Roadmap — Wardrobe
  [5, 12], // Sketchbook — Training Grounds
  [9, 12], // Roadmap — Training Grounds
  [0, 13], // Diary — Closet
  [11, 13], // Wardrobe — Closet
  [7, 13], // Treasury — Closet
];

// ══════════════════════════════════════════════════════
// CANVAS SETUP
// ══════════════════════════════════════════════════════
const canvas = document.getElementById('galaxy-canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); });

// ══════════════════════════════════════════════════════
// BACKGROUND STARS
// ══════════════════════════════════════════════════════
const BG_STARS = [];
const SHOOTERS = [];

function initBgStars() {
  BG_STARS.length = 0;
  const n = Math.floor(W * H / 2800);
  for (let i = 0; i < n; i++) {
    BG_STARS.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.1 + 0.1,
      o: Math.random() * 0.5 + 0.08,
      ts: Math.random() * 0.018 + 0.003,
      to: Math.random() * Math.PI * 2,
      c: ['255,255,255','220,200,255','200,210,255','255,230,180'][Math.floor(Math.random()*4)],
    });
  }
}
initBgStars();
window.addEventListener('resize', initBgStars);

function spawnShooter() {
  SHOOTERS.push({
    x: Math.random() * W * 0.7,
    y: Math.random() * H * 0.4,
    vx: Math.random() * 7 + 5,
    vy: Math.random() * 4 + 2,
    len: Math.random() * 110 + 70,
    life: 1,
    decay: Math.random() * 0.015 + 0.01,
    c: ['255,255,255','220,200,255','255,230,200'][Math.floor(Math.random()*3)],
  });
}

function schedShoot() {
  setTimeout(() => { spawnShooter(); schedShoot(); }, Math.random() * 6000 + 2500);
}
setTimeout(() => spawnShooter(), 1000);
setTimeout(() => spawnShooter(), 3000);
schedShoot();

// ══════════════════════════════════════════════════════
// CONSTELLATION STAR STATE
// ══════════════════════════════════════════════════════
let hoveredIdx = -1;
let clickedIdx = -1;
let pulseT = 0;

// Compute pixel positions
function px(page) { return { x: page.x * W, y: page.y * H }; }

// ══════════════════════════════════════════════════════
// HIT TESTING
// ══════════════════════════════════════════════════════
function hitTest(mx, my) {
  for (let i = 0; i < PAGES.length; i++) {
    const p = px(PAGES[i]);
    const hitR = Math.max(PAGES[i].r * 3.5, 28);
    if (Math.hypot(mx - p.x, my - p.y) < hitR) return i;
  }
  return -1;
}

// ══════════════════════════════════════════════════════
// MOUSE / TOUCH
// ══════════════════════════════════════════════════════
const tooltip = document.getElementById('tooltip');
const tooltipName = document.getElementById('tooltip-name');
const tooltipDesc = document.getElementById('tooltip-desc');

canvas.addEventListener('mousemove', e => {
  const idx = hitTest(e.clientX, e.clientY);
  hoveredIdx = idx;
  canvas.style.cursor = idx >= 0 ? 'pointer' : 'default';
  if (idx >= 0) {
    const p = px(PAGES[idx]);
    tooltip.style.left = p.x + 'px';
    tooltip.style.top = (p.y - PAGES[idx].r - 8) + 'px';
    tooltipName.textContent = PAGES[idx].name;
    tooltipDesc.textContent = PAGES[idx].desc;
    tooltip.classList.add('visible');
  } else {
    tooltip.classList.remove('visible');
  }
});

canvas.addEventListener('mouseleave', () => {
  hoveredIdx = -1;
  tooltip.classList.remove('visible');
  canvas.style.cursor = 'default';
});

canvas.addEventListener('click', e => {
  const idx = hitTest(e.clientX, e.clientY);
  if (idx >= 0) {
    clickedIdx = idx;
    // Brief flash then navigate
    setTimeout(() => { window.location.href = PAGES[idx].url; }, 320);
  }
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  const idx = hitTest(t.clientX, t.clientY);
  if (idx >= 0) {
    hoveredIdx = idx;
    const p = px(PAGES[idx]);
    tooltip.style.left = p.x + 'px';
    tooltip.style.top = (p.y - PAGES[idx].r - 8) + 'px';
    tooltipName.textContent = PAGES[idx].name;
    tooltipDesc.textContent = PAGES[idx].desc;
    tooltip.classList.add('visible');
    setTimeout(() => { window.location.href = PAGES[idx].url; }, 400);
  }
}, { passive: false });

// ══════════════════════════════════════════════════════
// DRAW
// ══════════════════════════════════════════════════════
let tick = 0;

function draw() {
  ctx.clearRect(0, 0, W, H);
  tick += 0.016;
  pulseT += 0.025;

  // ── Background stars ──
  BG_STARS.forEach(s => {
    const tw = Math.sin(tick * s.ts * 60 + s.to) * 0.3 + 0.7;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${s.c},${s.o * tw})`;
    ctx.fill();
  });

  // ── Shooting stars ──
  for (let i = SHOOTERS.length - 1; i >= 0; i--) {
    const s = SHOOTERS[i];
    const sp = Math.hypot(s.vx, s.vy);
    const tx = s.x - (s.vx / sp) * s.len * s.life;
    const ty = s.y - (s.vy / sp) * s.len * s.life;
    const g = ctx.createLinearGradient(tx, ty, s.x, s.y);
    g.addColorStop(0, `rgba(${s.c},0)`);
    g.addColorStop(0.6, `rgba(${s.c},${s.life * 0.4})`);
    g.addColorStop(1, `rgba(${s.c},${s.life})`);
    ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(s.x, s.y);
    ctx.strokeStyle = g; ctx.lineWidth = s.life * 2; ctx.lineCap = 'round'; ctx.stroke();
    const rg = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.life * 5);
    rg.addColorStop(0, `rgba(${s.c},${s.life})`); rg.addColorStop(1, `rgba(${s.c},0)`);
    ctx.beginPath(); ctx.arc(s.x, s.y, s.life * 4, 0, Math.PI * 2); ctx.fillStyle = rg; ctx.fill();
    s.x += s.vx; s.y += s.vy; s.life -= s.decay;
    if (s.life <= 0) SHOOTERS.splice(i, 1);
  }

  // ── Constellation lines ──
  LINES.forEach(([a, b]) => {
    const pa = px(PAGES[a]), pb = px(PAGES[b]);
    const isHighlighted = hoveredIdx === a || hoveredIdx === b;
    const g = ctx.createLinearGradient(pa.x, pa.y, pb.x, pb.y);
    const alpha = isHighlighted ? 0.45 : 0.12;
    g.addColorStop(0, `rgba(232,200,122,${alpha})`);
    g.addColorStop(0.5, `rgba(200,180,255,${alpha * 0.8})`);
    g.addColorStop(1, `rgba(232,200,122,${alpha})`);
    ctx.beginPath(); ctx.moveTo(pa.x, pa.y); ctx.lineTo(pb.x, pb.y);
    ctx.strokeStyle = g;
    ctx.lineWidth = isHighlighted ? 1 : 0.6;
    ctx.setLineDash(isHighlighted ? [] : [4, 6]);
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // ── Constellation stars ──
  PAGES.forEach((page, i) => {
    const { x, y } = px(page);
    const isHovered = hoveredIdx === i;
    const isClicked = clickedIdx === i;
    const pulse = Math.sin(pulseT + i * 0.8) * 0.3 + 0.7;
    const r = page.r;

    // Parse colour
    const hex = page.color;
    const rr = parseInt(hex.slice(1,3),16);
    const rg = parseInt(hex.slice(3,5),16);
    const rb = parseInt(hex.slice(5,7),16);
    const rgb = `${rr},${rg},${rb}`;

    // Outer glow
    const glowR = isHovered ? r * 5 : r * 3.5;
    const glowAlpha = isHovered ? 0.35 : 0.15 * pulse;
    const glow = ctx.createRadialGradient(x, y, 0, x, y, glowR);
    glow.addColorStop(0, `rgba(${rgb},${glowAlpha})`);
    glow.addColorStop(1, `rgba(${rgb},0)`);
    ctx.beginPath(); ctx.arc(x, y, glowR, 0, Math.PI * 2);
    ctx.fillStyle = glow; ctx.fill();

    // Ring (hovered)
    if (isHovered) {
      ctx.beginPath(); ctx.arc(x, y, r * 2, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(${rgb},0.3)`;
      ctx.lineWidth = 0.8; ctx.stroke();
    }

    // Click flash
    if (isClicked) {
      ctx.beginPath(); ctx.arc(x, y, r * 4, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(${rgb},0.6)`;
      ctx.lineWidth = 1.5; ctx.stroke();
    }

    // Star body — layered for depth
    const grad = ctx.createRadialGradient(x - r*0.25, y - r*0.25, 0, x, y, r);
    grad.addColorStop(0, `rgba(255,255,255,${isHovered?1:0.95*pulse})`);
    grad.addColorStop(0.3, `rgba(${rgb},${isHovered?0.95:0.8*pulse})`);
    grad.addColorStop(1, `rgba(${rgb},${isHovered?0.7:0.5*pulse})`);
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = grad; ctx.fill();

    // Sparkle cross on hover
    if (isHovered) {
      ctx.strokeStyle = `rgba(255,255,255,0.6)`;
      ctx.lineWidth = 0.8;
      const sl = r * 2.2;
      ctx.beginPath(); ctx.moveTo(x - sl, y); ctx.lineTo(x + sl, y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x, y - sl); ctx.lineTo(x, y + sl); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x - sl*0.6, y - sl*0.6); ctx.lineTo(x + sl*0.6, y + sl*0.6); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + sl*0.6, y - sl*0.6); ctx.lineTo(x - sl*0.6, y + sl*0.6); ctx.stroke();
    }

    // Label (always visible, dimmed unless hovered)
    const labelAlpha = isHovered ? 1 : 0.5;
    ctx.font = `${isHovered?'500 ':''}${isHovered?13:11}px "Cinzel", serif`;
    ctx.fillStyle = `rgba(232,200,122,${labelAlpha})`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(page.name, x, y + r + 10);
  });

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
